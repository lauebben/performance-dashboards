<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Game Performance Dashboard — Panetolikos FC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg-deep: #0b0d10;
    --bg-panel: #14181d;
    --bg-elevated: #1b2027;
    --border: #262d36;
    --border-strong: #323b47;
    --text-primary: #f4f5f7;
    --text-secondary: #a3acb9;
    --text-muted: #6b7480;
    --accent: #d4af37;       /* Panetolikos gold */
    --accent-dim: #8c7426;
    --accent-soft: rgba(212, 175, 55, 0.12);
    --pos: #2dd4a7;
    --neg: #ef6b6b;
    --shadow: 0 6px 24px rgba(0,0,0,0.35);
    --radius: 10px;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-display: 'Bebas Neue', 'Inter', sans-serif;
  }

  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-sans);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 32px 60px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 18px; }
  .crest {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
    display: flex; align-items: center; justify-content: center;
    color: #0b0d10;
    font-family: var(--font-display);
    font-size: 1.4rem;
    letter-spacing: 1px;
    box-shadow: 0 2px 12px rgba(212,175,55,0.3);
  }
  .titles h1 {
    font-family: var(--font-display);
    font-size: 1.8rem;
    letter-spacing: 1.5px;
    color: var(--text-primary);
  }
  .titles .subtitle {
    color: var(--text-secondary);
    font-size: 0.85rem;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }
  .titles .subtitle strong { color: var(--accent); font-weight: 600; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .refresh-btn {
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    color: var(--text-primary);
    padding: 9px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 0.85rem;
    font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.15s ease;
  }
  .refresh-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .refresh-btn svg { width: 14px; height: 14px; }

  /* Filter bar */
  .filters {
    display: grid;
    grid-template-columns: 2fr 2fr 1.2fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 900px) { .filters { grid-template-columns: 1fr; } }

  .filter {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .filter-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 600;
  }

  /* Native select for game and metric */
  select.dropdown {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    color: var(--text-primary);
    padding: 9px 12px;
    border-radius: 6px;
    font-family: var(--font-sans);
    font-size: 0.9rem;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a3acb9' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 14px;
    padding-right: 32px;
  }
  select.dropdown:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Multi-select drill */
  .multi-wrap { position: relative; }
  .multi-trigger {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    color: var(--text-primary);
    padding: 9px 12px;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-sans);
  }
  .multi-trigger:hover { border-color: var(--text-secondary); }
  .multi-trigger.open { border-color: var(--accent); }
  .multi-trigger .count-pill {
    background: var(--accent-soft);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.72rem;
    font-weight: 600;
    margin-left: 8px;
  }
  .multi-panel {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    max-height: 320px;
    overflow-y: auto;
    z-index: 50;
    box-shadow: var(--shadow);
    display: none;
  }
  .multi-panel.open { display: block; }
  .multi-actions {
    display: flex;
    gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
    position: sticky; top: 0;
  }
  .mini-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-secondary);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.72rem;
    cursor: pointer;
    font-family: var(--font-sans);
  }
  .mini-btn:hover { color: var(--accent); border-color: var(--accent); }
  .multi-option {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 0.86rem;
    color: var(--text-primary);
    user-select: none;
  }
  .multi-option:hover { background: var(--accent-soft); }
  .multi-option input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px; height: 14px;
    cursor: pointer;
  }

  /* Stats strip */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  @media (max-width: 900px) { .stats { grid-template-columns: repeat(2, 1fr); } }

  .stat {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0.7;
  }
  .stat .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .stat .value {
    font-family: var(--font-display);
    font-size: 1.8rem;
    color: var(--text-primary);
    letter-spacing: 1px;
    line-height: 1;
  }
  .stat .unit {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-left: 4px;
    font-family: var(--font-sans);
  }

  /* Table card */
  .card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }
  .card-title {
    font-family: var(--font-display);
    font-size: 1.15rem;
    letter-spacing: 1px;
    color: var(--text-primary);
  }
  .card-meta {
    font-size: 0.78rem;
    color: var(--text-secondary);
  }
  .card-meta .metric-name {
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  thead th {
    text-align: left;
    padding: 12px 20px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border-strong);
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--accent); }
  thead th.sorted { color: var(--accent); }
  thead th .sort-icon {
    display: inline-block;
    margin-left: 4px;
    opacity: 0.5;
    font-size: 0.7rem;
  }
  thead th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s ease;
  }
  tbody tr:hover { background: rgba(212,175,55,0.04); }
  tbody tr:last-child { border-bottom: none; }
  tbody td {
    padding: 11px 20px;
    color: var(--text-primary);
    white-space: nowrap;
  }
  tbody td.player-cell {
    font-weight: 500;
  }
  tbody td.numeric {
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  tbody td.metric-value {
    font-weight: 600;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .pos-bar {
    display: inline-block;
    background: var(--accent-soft);
    border-radius: 3px;
    padding: 2px 8px;
    color: var(--accent);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  /* Footer */
  .footer {
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.75rem;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .footer code {
    background: var(--bg-elevated);
    padding: 2px 6px;
    border-radius: 3px;
    color: var(--accent);
    font-size: 0.75rem;
  }

  /* Loading & error states */
  .loading, .error-msg {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-secondary);
  }
  .error-msg { color: var(--neg); }

  /* Drag-drop overlay */
  .dropzone {
    position: fixed;
    inset: 0;
    background: rgba(11,13,16,0.92);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    pointer-events: none;
  }
  .dropzone.active { display: flex; }
  .dropzone-inner {
    border: 2px dashed var(--accent);
    padding: 80px 100px;
    border-radius: 16px;
    color: var(--accent);
    font-family: var(--font-display);
    font-size: 1.6rem;
    letter-spacing: 1.5px;
    background: rgba(212,175,55,0.04);
  }

  /* Hidden file input */
  #fileInput { display: none; }
</style>
</head>
<body>

<div class="dropzone" id="dropzone">
  <div class="dropzone-inner">⬆ Drop CSV here</div>
</div>

<div class="app">

  <header class="header">
    <div class="header-left">
      <div class="crest">P</div>
      <div class="titles">
        <h1>Game Performance Dashboard</h1>
        <div class="subtitle">Team: <strong>Panetolikos FC</strong> · Match-day external load</div>
      </div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn" title="Replace CSV (or drag-drop a file anywhere)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Replace CSV
      </button>
      <input type="file" id="fileInput" accept=".csv" />
    </div>
  </header>

  <!-- Filters -->
  <div class="filters">
    <div class="filter">
      <div class="filter-label">Game</div>
      <select class="dropdown" id="gameSelect"></select>
    </div>
    <div class="filter">
      <div class="filter-label">Drill</div>
      <div class="multi-wrap">
        <button class="multi-trigger" id="drillTrigger">
          <span id="drillTriggerLabel">All drills</span>
          <span class="count-pill" id="drillCount">0</span>
        </button>
        <div class="multi-panel" id="drillPanel">
          <div class="multi-actions">
            <button class="mini-btn" id="drillSelectAll">Select all</button>
            <button class="mini-btn" id="drillClear">Clear</button>
          </div>
          <div id="drillOptions"></div>
        </div>
      </div>
    </div>
    <div class="filter">
      <div class="filter-label">Metric</div>
      <select class="dropdown" id="metricSelect"></select>
    </div>
  </div>

  <!-- Summary stats -->
  <div class="stats" id="statsRow"></div>

  <!-- Performance table -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">Performance Table</div>
      <div class="card-meta">
        Metric: <span class="metric-name" id="metricNameLabel">—</span>
        · <span id="rowCountLabel">0 players</span>
      </div>
    </div>
    <div id="tableWrapper">
      <div class="loading">Loading data…</div>
    </div>
  </div>

  <div class="footer">
    <div>Drop a new CSV anywhere to refresh — no model changes needed.</div>
    <div>Default file: <code>1_Final_Game-Report_FINAL.csv</code></div>
  </div>

</div>

<script>
/* ======================================================================
   Configuration: metric definitions
   Maps original CSV columns -> display name in the dashboard.
   Resilient to small naming variants in the source CSV.
   ====================================================================== */
const METRIC_DEFS = [
  { display: 'TD',       candidates: ['distanceTotal'],                      decimals: 1 },
  { display: 'mtr/min',  candidates: ['distancePerMin'],                     decimals: 2 },
  { display: 'HSR',      candidates: ['highSpeedRunningAbs'],                decimals: 1 },
  { display: 'HSR/min',  candidates: ['hsrAbsPerMin'],                       decimals: 2 },
  { display: 'Acc',      candidates: ['accelerationAbs', 'accelerationsAbs'],decimals: 0 },
  { display: 'Acc/min',  candidates: ['accelerationPerMinAbs','accelsPerMinAbs'], decimals: 2 },
  { display: 'Dec',      candidates: ['decelerationAbs', 'decelerationsAbs'],decimals: 0 },
  { display: 'Dec/min',  candidates: ['decelerationPerMinAbs','decelsPerMinAbs'], decimals: 2 },
  { display: 'mV',       candidates: ['maxSpeed'],                           decimals: 2 }
];

const DEFAULT_CSV_PATH = '1_Final_Game-Report_FINAL.csv';

/* ======================================================================
   State
   ====================================================================== */
const state = {
  rows: [],                  // raw rows from CSV
  resolvedMetrics: [],       // [{display, key, decimals}] - actual columns present
  selectedGame: null,        // { sessionTitle, drillDate, label }
  selectedDrills: new Set(), // drillTitles
  selectedMetric: null,      // display name
  sortKey: null,
  sortDir: 'desc'
};

/* ======================================================================
   Helpers
   ====================================================================== */
function normWS(s) { return (s || '').toString().replace(/\s+/g, ' ').trim(); }

function parseDate(s) {
  if (!s) return null;
  const parts = s.split('/');
  if (parts.length !== 3) return null;
  const [m, d, y] = parts.map(Number);
  if (!m || !d || !y) return null;
  return new Date(y, m - 1, d);
}

function formatDate(s) {
  const d = parseDate(s);
  if (!d) return s;
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function num(v) {
  if (v === null || v === undefined || v === '') return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

function fmtNum(n, decimals = 1) {
  if (n === null || n === undefined || !Number.isFinite(n)) return '—';
  return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

/* ======================================================================
   Data loading
   ====================================================================== */
function loadCSVFromText(text) {
  Papa.parse(text, {
    header: true,
    skipEmptyLines: true,
    transformHeader: h => h.trim(),
    complete: (res) => {
      try {
        ingest(res.data);
      } catch (e) {
        showError('Failed to parse CSV: ' + e.message);
      }
    },
    error: (err) => showError('Parse error: ' + err.message)
  });
}

function loadDefaultCSV() {
  fetch(DEFAULT_CSV_PATH, { cache: 'no-store' })
    .then(r => {
      if (!r.ok) throw new Error('Could not load ' + DEFAULT_CSV_PATH + ' (HTTP ' + r.status + ')');
      return r.text();
    })
    .then(loadCSVFromText)
    .catch(err => showError(
      err.message + '. Drop a CSV file anywhere on the page or use the “Replace CSV” button.'
    ));
}

function showError(msg) {
  document.getElementById('tableWrapper').innerHTML =
    '<div class="error-msg">⚠ ' + msg + '</div>';
}

/* ======================================================================
   Ingest data
   ====================================================================== */
function ingest(rows) {
  if (!rows || rows.length === 0) {
    showError('CSV contains no rows.');
    return;
  }

  // Detect which metric columns are actually present (handles spelling variants)
  const headers = Object.keys(rows[0]);
  state.resolvedMetrics = METRIC_DEFS.map(def => {
    const key = def.candidates.find(c => headers.includes(c));
    return key ? { display: def.display, key, decimals: def.decimals } : null;
  }).filter(Boolean);

  if (state.resolvedMetrics.length === 0) {
    showError('No recognised metric columns found in CSV.');
    return;
  }

  // Required columns
  if (!headers.includes('playerLastName')) {
    showError('CSV missing required column: playerLastName');
    return;
  }
  if (!headers.includes('totalTime')) {
    showError('CSV missing required column: totalTime');
    return;
  }

  // Normalise sessionTitle (collapse whitespace) for cleaner dropdown
  state.rows = rows.map(r => ({
    ...r,
    sessionTitle: normWS(r.sessionTitle),
    drillTitle:  normWS(r.drillTitle),
    drillDate:   normWS(r.drillDate)
  }));

  populateGameSelect();
  populateMetricSelect();
  // Default game = most recent
  const gameSel = document.getElementById('gameSelect');
  if (gameSel.options.length > 0) {
    gameSel.selectedIndex = 0;
    onGameChange();
  }
}

/* ======================================================================
   Game slicer (sessionTitle + drillDate combined)
   ====================================================================== */
function populateGameSelect() {
  const seen = new Map();
  for (const r of state.rows) {
    if (!r.sessionTitle || !r.drillDate) continue;
    const key = r.sessionTitle + '||' + r.drillDate;
    if (!seen.has(key)) {
      seen.set(key, {
        sessionTitle: r.sessionTitle,
        drillDate: r.drillDate,
        date: parseDate(r.drillDate)
      });
    }
  }
  const games = [...seen.values()].sort((a, b) => {
    if (a.date && b.date) return b.date - a.date;
    return a.sessionTitle.localeCompare(b.sessionTitle);
  });

  const sel = document.getElementById('gameSelect');
  sel.innerHTML = '';
  games.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.sessionTitle + '||' + g.drillDate;
    opt.textContent = g.sessionTitle + ' — ' + formatDate(g.drillDate);
    sel.appendChild(opt);
  });
}

function getSelectedGame() {
  const v = document.getElementById('gameSelect').value;
  if (!v) return null;
  const [sessionTitle, drillDate] = v.split('||');
  return { sessionTitle, drillDate };
}

/* ======================================================================
   Drill slicer (multi-select, depends on selected game)
   ====================================================================== */
function populateDrillSelect() {
  const game = getSelectedGame();
  const drills = new Set();
  for (const r of state.rows) {
    if (game && (r.sessionTitle !== game.sessionTitle || r.drillDate !== game.drillDate)) continue;
    if (r.drillTitle) drills.add(r.drillTitle);
  }
  // Sort: 'Entire Session' first, then alphabetically
  const sortedDrills = [...drills].sort((a, b) => {
    if (a.toLowerCase() === 'entire session') return -1;
    if (b.toLowerCase() === 'entire session') return 1;
    return a.localeCompare(b);
  });

  // Default: select 'Entire Session' if present, otherwise all drills
  state.selectedDrills = new Set();
  const entire = sortedDrills.find(d => d.toLowerCase() === 'entire session');
  if (entire) {
    state.selectedDrills.add(entire);
  } else {
    sortedDrills.forEach(d => state.selectedDrills.add(d));
  }

  // Render
  const container = document.getElementById('drillOptions');
  container.innerHTML = '';
  sortedDrills.forEach(d => {
    const lbl = document.createElement('label');
    lbl.className = 'multi-option';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = d;
    cb.checked = state.selectedDrills.has(d);
    cb.addEventListener('change', () => {
      if (cb.checked) state.selectedDrills.add(d);
      else state.selectedDrills.delete(d);
      updateDrillTriggerLabel();
      render();
    });
    const txt = document.createElement('span');
    txt.textContent = d;
    lbl.appendChild(cb);
    lbl.appendChild(txt);
    container.appendChild(lbl);
  });

  updateDrillTriggerLabel();
}

function updateDrillTriggerLabel() {
  const count = state.selectedDrills.size;
  const totalOptions = document.querySelectorAll('#drillOptions input').length;
  const label = document.getElementById('drillTriggerLabel');
  const pill = document.getElementById('drillCount');

  if (count === 0) {
    label.textContent = 'No drills selected';
  } else if (count === 1) {
    label.textContent = [...state.selectedDrills][0];
  } else if (count === totalOptions) {
    label.textContent = 'All drills';
  } else {
    label.textContent = count + ' drills selected';
  }
  pill.textContent = count;
}

/* ======================================================================
   Metric slicer
   ====================================================================== */
function populateMetricSelect() {
  const sel = document.getElementById('metricSelect');
  sel.innerHTML = '';
  state.resolvedMetrics.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.display;
    opt.textContent = m.display;
    sel.appendChild(opt);
  });
  state.selectedMetric = state.resolvedMetrics[0].display;
  sel.value = state.selectedMetric;
}

/* ======================================================================
   Render
   ====================================================================== */
function getCurrentMetric() {
  return state.resolvedMetrics.find(m => m.display === state.selectedMetric);
}

function buildTableData() {
  const game = getSelectedGame();
  const metric = getCurrentMetric();
  if (!game || !metric) return [];

  // Filter rows
  const filtered = state.rows.filter(r =>
    r.sessionTitle === game.sessionTitle &&
    r.drillDate === game.drillDate &&
    state.selectedDrills.has(r.drillTitle)
  );

  // Aggregate per player: sum metric & sum time across selected drills
  // (For mV / max-type metrics we take the max instead of the sum.)
  const isMaxMetric = metric.display === 'mV';
  // For "/min" rate metrics, recompute as weighted average using time
  const isRateMetric = /\/min$/i.test(metric.display);

  const byPlayer = new Map();
  for (const r of filtered) {
    const player = r.playerLastName;
    if (!player) continue;

    const t = num(r.totalTime) || 0;
    const v = num(r[metric.key]);

    if (!byPlayer.has(player)) {
      byPlayer.set(player, { player, time: 0, metricSum: 0, metricMax: -Infinity, metricWeighted: 0 });
    }
    const p = byPlayer.get(player);
    p.time += t;
    if (v !== null) {
      p.metricSum += v;
      if (v > p.metricMax) p.metricMax = v;
      p.metricWeighted += v * t;
    }
  }

  const out = [...byPlayer.values()].map(p => {
    let metricVal;
    if (isMaxMetric) {
      metricVal = (p.metricMax === -Infinity) ? null : p.metricMax;
    } else if (isRateMetric) {
      metricVal = (p.time > 0) ? (p.metricWeighted / p.time) : null;
    } else {
      metricVal = p.metricSum;
    }
    return { Player: p.player, Time: p.time, Metric: metricVal };
  });

  // Sort
  const sortKey = state.sortKey || 'Metric';
  const dir = state.sortDir === 'asc' ? 1 : -1;
  out.sort((a, b) => {
    const av = a[sortKey], bv = b[sortKey];
    if (sortKey === 'Player') return dir * String(av).localeCompare(String(bv));
    const an = (av === null || av === undefined) ? -Infinity : av;
    const bn = (bv === null || bv === undefined) ? -Infinity : bv;
    return dir * (an - bn);
  });

  return out;
}

function renderStats(data) {
  const metric = getCurrentMetric();
  const game = getSelectedGame();
  const row = document.getElementById('statsRow');

  if (!data.length || !metric) {
    row.innerHTML = '';
    return;
  }

  const players = data.length;
  const totalTime = data.reduce((s, r) => s + (r.Time || 0), 0);
  const metricVals = data.map(r => r.Metric).filter(v => v !== null && Number.isFinite(v));
  const sum = metricVals.reduce((s, v) => s + v, 0);
  const avg = metricVals.length ? sum / metricVals.length : null;
  const max = metricVals.length ? Math.max(...metricVals) : null;
  const topPlayer = data.find(r => r.Metric === max);

  const dec = metric.decimals;

  row.innerHTML = `
    <div class="stat">
      <div class="label">Players</div>
      <div class="value">${players}</div>
    </div>
    <div class="stat">
      <div class="label">Total Time</div>
      <div class="value">${fmtNum(totalTime, 0)}<span class="unit">min</span></div>
    </div>
    <div class="stat">
      <div class="label">Avg ${metric.display}</div>
      <div class="value">${fmtNum(avg, dec)}</div>
    </div>
    <div class="stat">
      <div class="label">Top ${metric.display}</div>
      <div class="value">${fmtNum(max, dec)}<span class="unit">${topPlayer ? '· ' + topPlayer.Player : ''}</span></div>
    </div>
  `;
}

function renderTable(data) {
  const wrap = document.getElementById('tableWrapper');
  const metric = getCurrentMetric();
  if (!metric) { wrap.innerHTML = '<div class="empty-state">Select a metric.</div>'; return; }

  if (!data.length) {
    wrap.innerHTML = '<div class="empty-state">No matching rows for the current filter selection.</div>';
    return;
  }

  const dec = metric.decimals;
  const sortKey = state.sortKey || 'Metric';

  const arrow = (col) => sortKey === col
    ? `<span class="sort-icon">${state.sortDir === 'asc' ? '▲' : '▼'}</span>`
    : `<span class="sort-icon">↕</span>`;

  const headerCls = (col) => sortKey === col ? 'sorted' : '';

  let html = `
    <table>
      <thead>
        <tr>
          <th class="${headerCls('Player')}" data-sort="Player">Player ${arrow('Player')}</th>
          <th class="${headerCls('Time')}" data-sort="Time" style="text-align:right">Time (min) ${arrow('Time')}</th>
          <th class="${headerCls('Metric')}" data-sort="Metric" style="text-align:right">${metric.display} ${arrow('Metric')}</th>
        </tr>
      </thead>
      <tbody>
  `;
  for (const r of data) {
    html += `
      <tr>
        <td class="player-cell">${r.Player}</td>
        <td class="numeric">${fmtNum(r.Time, 1)}</td>
        <td class="metric-value"><span class="pos-bar">${fmtNum(r.Metric, dec)}</span></td>
      </tr>
    `;
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;

  // Sort handlers
  wrap.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.sort;
      if (state.sortKey === k) {
        state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortKey = k;
        state.sortDir = (k === 'Player') ? 'asc' : 'desc';
      }
      render();
    });
  });

  document.getElementById('rowCountLabel').textContent =
    data.length + (data.length === 1 ? ' player' : ' players');
  document.getElementById('metricNameLabel').textContent = metric.display;
}

function render() {
  const data = buildTableData();
  renderStats(data);
  renderTable(data);
}

/* ======================================================================
   Event wiring
   ====================================================================== */
function onGameChange() {
  populateDrillSelect();
  render();
}

document.getElementById('gameSelect').addEventListener('change', onGameChange);

document.getElementById('metricSelect').addEventListener('change', (e) => {
  state.selectedMetric = e.target.value;
  // reset to default sort on metric change (descending by metric)
  state.sortKey = 'Metric';
  state.sortDir = 'desc';
  render();
});

// Multi-select drill panel
const drillTrigger = document.getElementById('drillTrigger');
const drillPanel = document.getElementById('drillPanel');
drillTrigger.addEventListener('click', (e) => {
  e.stopPropagation();
  drillPanel.classList.toggle('open');
  drillTrigger.classList.toggle('open');
});
document.addEventListener('click', (e) => {
  if (!drillPanel.contains(e.target) && e.target !== drillTrigger) {
    drillPanel.classList.remove('open');
    drillTrigger.classList.remove('open');
  }
});

document.getElementById('drillSelectAll').addEventListener('click', () => {
  const cbs = document.querySelectorAll('#drillOptions input[type="checkbox"]');
  cbs.forEach(cb => { cb.checked = true; state.selectedDrills.add(cb.value); });
  updateDrillTriggerLabel();
  render();
});
document.getElementById('drillClear').addEventListener('click', () => {
  const cbs = document.querySelectorAll('#drillOptions input[type="checkbox"]');
  cbs.forEach(cb => { cb.checked = false; });
  state.selectedDrills.clear();
  updateDrillTriggerLabel();
  render();
});

// File replace
const fileInput = document.getElementById('fileInput');
document.getElementById('refreshBtn').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => loadCSVFromText(ev.target.result);
  reader.readAsText(file);
});

// Drag & drop anywhere
const dropzone = document.getElementById('dropzone');
let dragCounter = 0;
window.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  dropzone.classList.add('active');
});
window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('dragleave', (e) => {
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dropzone.classList.remove('active');
  }
});
window.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropzone.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  if (!file.name.toLowerCase().endsWith('.csv')) {
    showError('Please drop a .csv file.');
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => loadCSVFromText(ev.target.result);
  reader.readAsText(file);
});

/* ======================================================================
   Boot
   ====================================================================== */
loadDefaultCSV();
</script>
